<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Reviews - Match Time Sports</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:25px;
color:#111827;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
}

textarea{
height:120px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#22c55e;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style></head><body><div class="container"><h1>⭐ Submit Your Review</h1><input type="text"
id="name"
placeholder="Enter Your Name">

<select id="rating">
<option value="5">⭐⭐⭐⭐⭐ (5 Star)</option>
<option value="4">⭐⭐⭐⭐ (4 Star)</option>
<option value="3">⭐⭐⭐ (3 Star)</option>
<option value="2">⭐⭐ (2 Star)</option>
<option value="1">⭐ (1 Star)</option>
</select><textarea
id="review"
placeholder="Write your review here">
</textarea><button onclick="submitReview()">
Submit Review
</button></div><script type="module">

import { db } from "./firebase.js";

import {
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.submitReview = async function(){

let name =
document.getElementById("name").value;

let rating =
document.getElementById("rating").value;

let review =
document.getElementById("review").value;

if(name === "" || review === ""){
alert("Please fill all fields");
return;
}

try{

await addDoc(
collection(db,"reviews"),
{
name:name,
rating:Number(rating),
review:review,
date:new Date().toLocaleString()
}
);

alert("Review Submitted Successfully ✅");

document.getElementById("name").value="";
document.getElementById("review").value="";

}catch(error){

alert(error.message);

}

}

</script></body>
</html>

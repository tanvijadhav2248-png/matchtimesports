<!DOCTYPE html>
<html>
<head>
<title>Cricket Shorts Collection</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:20px;
}

.container{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    width:320px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
    transition:0.3s;
    position:relative;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.card img{
    width:100%;
    height:260px;
    object-fit:cover;
    border-radius:15px;
    transition:0.4s;
}

.card:hover img{
    transform:scale(1.05);
}

.price{
    color:green;
    font-size:22px;
    font-weight:bold;
}

button{
    background:#111827;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}



button{
    background:#16a34a;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    width:100%;
}

.back-btn{
    display:inline-block;
    margin-top:40px;
    background:#22c55e;
    color:white;
    padding:12px 25px;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

.back-btn:hover{
    background:#16a34a;
    transform:translateY(-2px);
}

button:hover{
    background:#15803d;
}

.banner{
    background:#111827;
    color:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:30px;
    font-weight:bold;
    font-size:18px;
}

.subtitle{
    color:#64748b;
    margin-bottom:30px;
    font-size:18px;
}

.card{
    position:relative;
}

.badge{
    position:absolute;
    top:15px;
    left:15px;
    background:#ef4444;
    color:white;
    padding:8px 15px;
    border-radius:30px;
    font-size:13px;
    font-weight:bold;
   box-shadow:0 5PX 10PX rgba(0,0,0,0.2);
}

.old-price{
    color:gray;
    text-decoration:line-through;
    font-size:16px;
    margin-left:8px;
}

.container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

button{
    width:90%;
    margin-bottom:15px;
    background:linear-gradient(
        135deg,
        #22c55e,
        #16a34a
    );
    color:white;
    border:none;
    padding:14px;
    border-radius:10px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

.back-container{
    width:100%;
    text-align:center;
    margin-top:40px;
}

.back-btn{
    display:inline-block;
}

.rating{
    color:#f59e0b;
    font-size:14px;
    margin:5px 0;
}

.delivery{
    color:#16a34a;
    font-size:13px;
    font-weight:bold;
}

.cart-icon{
    position:fixed;
    top:20px;
    right:30px;
    background:#111827;
    color:white;
    padding:12px 18px;
    border-radius:30px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    z-index:1000;
}

.cart-icon:hover{
    background:#16a34a;
}

</style>
</head>

<body>
    <div class="cart-icon">
    🛒 Cart (<span id="cart-count">0</span>)
</div>

<h1>🏏 Cricket Shorts Collection</h1>

<p class="subtitle">
Premium Performance Shorts For Cricket Players
</p>

<div class="container">

<div class="card">

    <div class="badge">20% OFF</div>

    <img src="shorts1.jpeg" alt="Training Shorts">
    <p class="rating">⭐⭐⭐⭐⭐ (4.9)</p>

    <h3>Training Shorts</h3>

    <p>Lightweight & Comfortable</p>

    <div class="price">
        ₹350
        <span class="old-price">₹450</span>
    </div>


    <button onclick="addToCart(
    'Training shorts',
    350,
    'shorts1.jpeg'
    )">
    Add To Cart
    </button>
</div>

<div class="card">

    <div class="badge">20% OFF</div>

    <img src="shorts2.jpeg" alt="Sports Shorts">
    <p class="rating">⭐⭐⭐⭐⭐ (4.8)</p>

    <h3>Sports Shorts</h3>

    <p>Breathable Fabric</p>

    <div class="price">
        ₹350
        <span class="old-price">₹500</span>
    </div>

    <button onclick="addToCart(
    'Sports Shorts',
    350,
    'shorts2.jpeg'
    )">
    Add To Cart
    </button>
</div>

<div class="back-container">
    <a href="matchtimeweb.html" class="back-btn">
        ← Back To Home
    </a>
</div>


<script>

function addToCart(name, price, image){

    let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({
        name: name,
        price: price,
        image: image,
        quantity: 1
    });

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    alert(name + " Added To Cart!");
}

function updateCartCount(){

    let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    let cartCount =
    document.getElementById("cart-count");

    if(cartCount){
        cartCount.innerText = cart.length;
    }
}

updateCartCount();

</script>

</body>
</html>

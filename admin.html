<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.product-img{
width:80px;
height:80px;
object-fit:cover;
border-radius:10px;
}

.status-dropdown{
padding:6px 10px;
border:none;
border-radius:6px;
font-weight:bold;
color:white;
cursor:pointer;
}

.pending{
background:#f39c12;
}

.processing{
background:#3498db;
}

.shipped{
background:#9b59b6;
}

.delivered{
background:#27ae60;
}

.cancelled{
background:#e74c3c;
}

</style>

</head>
<body>

<h1>📦 Orders</h1>

<div id="orders"></div>

<script type="module">

import { db } from "./firebase.js";

import {
  collection,
  getDocs,
  updateDoc,
  doc,
} from 
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

async function loadOrders() {

  try {

    const snapshot = await getDocs(collection(db, "orders"));

    console.log("Orders Found:", snapshot.size);

    let html = "";

    snapshot.forEach(doc => {

      const order = doc.data();

      html += `
      <div class="order">

        <h3>${order.orderId || "No Order ID"}</h3>

        <p><b>Name:</b> ${order.name || ""}</p>

        <p><b>Mobile:</b> ${order.mobile || ""}</p>

        <p><b>Payment:</b> ${order.payment || ""}</p>

    <p>
        <b>Status:</b>

        <p>
<b>Status:</b>

<select
class="status-dropdown ${(order.status || 'Pending').toLowerCase()}"
onchange="updateStatus('${doc.id}', this.value, this)"
>

<option value="Pending"
${(order.status || "Pending") === "Pending" ? "selected" : ""}>
Pending
</option>

<option value="Processing"
${order.status === "Processing" ? "selected" : ""}>
Processing
</option>

<option value="Shipped"
${order.status === "Shipped" ? "selected" : ""}>
Shipped
</option>

<option value="Delivered"
${order.status === "Delivered" ? "selected" : ""}>
Delivered
</option>

<option value="Cancelled"
${order.status === "Cancelled" ? "selected" : ""}>
Cancelled
</option>

</select>
</p>
        <p><b>Total:</b> ₹${order.total || 0}</p>

        <h4>Products:</h4>
      `;

      (order.products || []).forEach(product => {

        html += `
        <div>

          <img
            src="${product.image || 'images/no-image.png'}"
            class="product-img"
          >

          <p>${product.name || "No Name"}</p>

          <p>₹${product.price || 0}</p>

      <p>Qty: ${product.quantity || 1}</p>

        </div>

        <hr>
        `;
      });

      html += `</div>`;
    });

    document.getElementById("orders").innerHTML = html;

  } catch (error) {

    console.error(error);
    alert(error.message);

  }

}

loadOrders();
window.updateStatus = async function(orderId, status, selectElement){

try{

await updateDoc(
doc(db,"orders",orderId),
{
status: status
}
);

selectElement.className =
"status-dropdown " + status.toLowerCase();

alert("✅ Status Updated!");

}catch(error){

console.error(error);
alert(error.message);

}

}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Match Time Sports</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#f5f5f5;
    padding:30px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#111827;
    margin-bottom:20px;
}

#amount{
    text-align:center;
    color:#22c55e;
    margin-bottom:25px;
}

label{
    font-weight:bold;
    display:block;
    margin-top:15px;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:1px solid #ddd;
    border-radius:8px;
}

textarea{
    height:120px;
    resize:none;
}

button{
    width:100%;
    margin-top:25px;
    background:#22c55e;
    color:white;
    border:none;
    padding:15px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    background:#16a34a;
}

.back-btn{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
    color:#111827;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🛍 Checkout</h1>

<p style="text-align:center;color:gray;">
🔒 Secure Checkout
</p>

<h2 id="amount">Total Amount: ₹0</h2>
<p id="shippingAmount" style="text-align:center;color:#ef4444;font-weight:bold;">
Shipping: ₹80
</p>

<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your full name">

<label>Mobile Number</label>
<input type="text" id="mobile" placeholder="Enter mobile number">

<label>Delivery Address</label>
<textarea id="address" placeholder="Enter delivery address"></textarea>

<label>State</label>

<select id="state" onchange="updateShipping()">
<option value="Maharashtra">Maharashtra</option>
<option value="Gujarat">Gujarat</option>
<option value="Goa">Goa</option>
<option value="Karnataka">Karnataka</option>
<option value="Other">Other State</option>
</select>

<label>Payment Method</label>

<select id="payment">
    <option>Cash On Delivery</option>
    <option>UPI</option>
</select>

<button onclick="placeOrder()">
Place Order
</button>

<a href="cart.html" class="back-btn">
← Back To Cart
</a>

</div>

<p style="text-align:center;margin-top:20px;color:gray;font-size:14px;">
© 2026 Match Time Sports | All Rights Reserved
</p>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

let subtotal = 0;

cart.forEach(item => {
    subtotal += item.price * item.quantity;
});

let shipping = 0;
let finalTotal = 0;

window.updateShipping = function(){

let state =
document.getElementById("state").value;

if(state === "Maharashtra"){
    shipping = 50;
}
else if(state === "Gujarat"){
    shipping = 80;
}
else if(state === "Goa"){
    shipping = 100;
}
else if(state === "Karnataka"){
    shipping = 120;
}
else{
    shipping = 150;
}

finalTotal = subtotal + shipping;

document.getElementById("amount").innerText =
"Total Amount: ₹" + finalTotal;

document.getElementById("shippingAmount").innerText =
"Shipping: ₹" + shipping;

}

updateShipping();

window.placeOrder = async function(){

    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;
    let address = document.getElementById("address").value;
    let payment = document.getElementById("payment").value;

    if(name === "" || mobile === "" || address === ""){
        alert("Please fill all details");
        return;
    }

    try{

        let orderId = "MTS" + Date.now();

        await addDoc(collection(db,"orders"),{
            orderId: orderId,
            name: name,
            mobile: mobile,
            address: address,
            payment: payment,

            subtotal: subtotal,
            shipping: shipping,
            total: finalTotal,

            products:cart,

            status: "pending",

            date: new Date().toLocaleString()
        });

        let productList = "";

        cart.forEach(item => {
        productList +=
        item.name +
        " x " +
        item.quantity +
        " = ₹" +
        (item.price * item.quantity) +
        "\n";
    });

        let message =
        "🛒 New Order%0A%0A" +
        "Name: " + name + "%0A" +
        "Mobile: " + mobile + "%0A" +
        "Address: " + address + "%0A%0A" +
        "Products:%0A" + productList + "%0A" +
        "Payment: " + payment + "%0A" +
        "Amount: ₹" + finalTotal;

    if(payment === "UPI"){

    sessionStorage.setItem("lastOrderId", orderId);

    window.location.href = "upi.html";

}else{

    window.open(
        "https://wa.me/918108870708?text=" +
        encodeURIComponent(message),
        "_blank"
    );

    localStorage.removeItem("cart");
    window.location.href = "order-success.html";
}

    }catch(error){
        console.error(error);
        alert(error.message);
    }
};



</script>

</body>
</html>
